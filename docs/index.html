<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Олег vs Алекс - Битва Прогнозистов 🏆</title>
    <!-- Подключаем шрифт Inter для современного вида -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновые декоративные элементы для Glassmorphism -->
    <div class="blob blob-blue"></div>
    <div class="blob blob-red"></div>

    <div class="container">
        <header>
            <h1>Битва Прогнозистов</h1>
            <p class="subtitle">World Cup 2026</p>
        </header>
        
        <nav class="g-tabs">
            <button class="g-tab-btn active" onclick="switchTab('overview')">Обзор</button>
            <button class="g-tab-btn" onclick="switchTab('groups')">Группы</button>
            <button class="g-tab-btn" onclick="switchTab('playoffs')">Плей-офф</button>
            <button class="g-tab-btn" onclick="switchTab('predictions')">Прогнозы</button>
        </nav>

        <div id="tab-overview" class="tab-content active">
            <div class="g-scoreboard">
                <div class="g-score-player">
                    <div class="g-score-name" style="color: var(--color-oleg);">Олег</div>
                    <div class="g-score-pts" id="scoreOleg">0</div>
                </div>
                <div class="g-score-divider">
                    <div class="g-score-gap" id="gapText">Загрузка...</div>
                </div>
                <div class="g-score-player text-right">
                    <div class="g-score-name" style="color: var(--color-alex);">Алекс</div>
                    <div class="g-score-pts" id="scoreAlex">0</div>
                </div>
            </div>

        <section class="chart-container">
            <div class="chart-scroll-wrapper">
                <canvas id="pointsChart"></canvas>
            </div>
        </section>
        
        <section class="matches-container">
            <h2>Результаты и прогнозы (Последние 20)</h2>
            <div id="matchesList" class="matches-list">
                <!-- Сюда JS вставит карточки матчей -->
            </div>
            </section>
        </div>
        
        <!-- Вкладка 2: Группы -->
        <div id="tab-groups" class="tab-content">
            <div id="groupsContainer" class="groups-grid">
                <!-- Сюда JS вставит таблицы групп -->
            </div>
        </div>

        <!-- Вкладка 3: Плей-офф -->
        <section id="playoffs-tab" class="tab-content" style="display: none;">
            <div id="playoffsWrapper">
                <div class="bracket-container" id="playoffsGrid">
                    <!-- Сетка плей-офф -->
                </div>
            </div>
        </section>

        <!-- Вкладка Прогнозы -->
        <div id="tab-predictions" class="tab-content">
            <div class="predictions-header">
                <h2>Предстоящие матчи</h2>
                <button class="tg-share-btn" onclick="shareToTelegram()">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
                    Отправить в Telegram
                </button>
            </div>
            <div id="upcomingList" class="matches-list">
                <!-- Карточки будут добавлены через JS -->
            </div>
        </div>
        <footer>
            <p>Последнее обновление: <span id="lastUpdated">--</span></p>
        </footer>
    </div>

    <!-- Подключаем Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Загружаем данные из локального js-файла для обхода CORS -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
