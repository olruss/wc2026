<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Олег vs Алекс - Битва Прогнозистов 🏆</title>
    <!-- Подключаем шрифт Inter для современного вида -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1782614526">
</head>
<body>
    <!-- Фоновые декоративные элементы для Glassmorphism -->
    <div class="blob blob-blue"></div>
    <div class="blob blob-red"></div>

    <div class="container">
        <header>
            <h1>Битва Прогнозистов</h1>
            <p class="subtitle">World Cup 2026</p>
        </header>
        
        <nav class="g-tabs">
            <button class="g-tab-btn active" onclick="switchTab('overview')">Обзор</button>
            <button class="g-tab-btn" onclick="switchTab('favorites')">Фавориты</button>
            <button class="g-tab-btn" onclick="switchTab('groups')">Группы</button>
            <button class="g-tab-btn" onclick="switchTab('playoffs')">Плей-офф</button>
            <button class="g-tab-btn" onclick="switchTab('predictions')">Прогнозы</button>
        </nav>

        <div id="tab-overview" class="tab-content active">
            <div class="g-scoreboard">
                <div class="g-score-player">
                    <div class="crown" id="crownOleg"></div>
                    <div class="g-score-name" style="color: var(--color-oleg);">Олег</div>
                    <div class="g-score-pts" id="scoreOleg">0</div>
                    <div class="player-stats">
                        <div class="stat-item"><span id="stats-exact-Oleg">0</span> точных</div>
                        <div class="stat-item"><span id="stats-outcomes-Oleg">0</span> исходов</div>
                        <div class="stat-item"><span id="stats-catches-Oleg">0</span> зацепов</div>
                    </div>
                    <div class="g-score-form" id="form-Oleg"></div>
                </div>
                <div class="g-score-divider">
                    <div class="g-score-gap" id="gapText">Загрузка...</div>
                </div>
                <div class="g-score-player text-right">
                    <div class="crown" id="crownAlex"></div>
                    <div class="g-score-name" style="color: var(--color-alex);">Алекс</div>
                    <div class="g-score-pts" id="scoreAlex">0</div>
                    <div class="player-stats text-right">
                        <div class="stat-item"><span id="stats-exact-Alex">0</span> точных</div>
                        <div class="stat-item"><span id="stats-outcomes-Alex">0</span> исходов</div>
                        <div class="stat-item"><span id="stats-catches-Alex">0</span> зацепов</div>
                    </div>
                    <div class="g-score-form text-right" id="form-Alex"></div>
                </div>
            </div>

        <section class="chart-container">
            <div class="chart-scroll-wrapper">
                <canvas id="pointsChart"></canvas>
            </div>
        </section>
        
        <section class="matches-container">
            <h2>Результаты и прогнозы (Последние 20)</h2>
            <div id="matchesList" class="matches-list">
                <!-- Сюда JS вставит карточки матчей -->
            </div>
            </section>
        </div>
        
        <!-- Вкладка 2: Группы -->
        <div id="tab-groups" class="tab-content">
            <div id="groupsContainer" class="groups-grid">
                <!-- Сюда JS вставит таблицы групп -->
            </div>
        </div>

        <!-- Вкладка 3: Плей-офф -->
        <section id="tab-playoffs" class="tab-content">
            <div id="playoffsWrapper">
                <div class="bracket-container" id="playoffsGrid">
                    <!-- Сетка плей-офф -->
                </div>
            </div>
        </section>


        <!-- Вкладка Фавориты -->
        <div id="tab-favorites" class="tab-content">
            <div class="favorites-section">
            <h3>Команды-фавориты</h3>
            <div class="favorites-grid">
                <div class="favorites-col" id="fav-Oleg"></div>
                <div class="favorites-col" id="fav-Alex"></div>
            </div>
        </div>
        </div>

        <!-- Вкладка Прогнозы -->
        <div id="tab-predictions" class="tab-content">
            <div class="predictions-header">
                <h2>Предстоящие матчи</h2>
                <button class="tg-share-btn" onclick="copyToClipboard(this)">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                    Скопировать
                </button>
            </div>
            <div id="upcomingList" class="matches-list">
                <!-- Карточки будут добавлены через JS -->
            </div>
        </div>
        <footer>
            <p>Последнее обновление: <span id="lastUpdated">--</span></p>
        </footer>
    </div>

    <!-- Подключаем Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Загружаем данные из локального js-файла для обхода CORS -->
    <script src="data.js?v=1782614526"></script>
    <script src="app.js?v=1782614526"></script>
</body>
</html>
